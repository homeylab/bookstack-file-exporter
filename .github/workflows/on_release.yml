---
name: Create Official Release and Push Artifacts

on:
  push:
    tags:
      - v*

permissions:
  contents: write

# never cancel a release mid-flight (partial artifacts); tags are unique so this only guards dup runs
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Tests
        uses: ./.github/actions/tests
  create_release:
    runs-on: ubuntu-latest
    needs: tests
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          generateReleaseNotes: true
  # build and push docker image
  release-docker:
    runs-on: ubuntu-latest
    needs:
      - tests
      - create_release
    environment: 'Dockerhub'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run Docker Build
        uses: ./.github/actions/docker
        with:
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
  release-python:
    runs-on: ubuntu-latest
    needs:
      - tests
      - create_release
    timeout-minutes: 20
    environment: 'PyPi'
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Get tag release without v
      shell: bash
      run: |
        TAG=${{ github.ref_name }}
        echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
        echo "Tag without v is: ${VERSION}"
    - name: Update Release Tag
      shell: bash
      run: sed -i "s/^version = .*/version = \"${{ env.VERSION }}\"/" pyproject.toml
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
    - name: Build Python Package
      shell: bash
      run: uv build
    - name: Publish to PyPi
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        skip-existing: true