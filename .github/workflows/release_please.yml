---
name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

# never cancel a release mid-flight (partial artifacts); ref is unique so this only guards dup runs
concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  tests:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Tests
        uses: ./.github/actions/tests
        with:
          python-version: ${{ matrix.python-version }}
          run-lint: ${{ matrix.python-version == '3.14' && 'true' || 'false' }}

  release-docker:
    needs: [release-please, tests]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    environment: 'Dockerhub'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Run Docker Build
        uses: ./.github/actions/docker
        with:
          version: ${{ needs.release-please.outputs.tag_name }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

  release-python:
    needs: [release-please, tests]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    environment: 'PyPi'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Build Python Package
        shell: bash
        run: uv build
      - name: Publish to PyPi
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
