---
name: Test Python Package
description: Test and lint code

inputs:
  python-version:
    description: Python version to use (empty = fall back to .python-version)
    default: ""
  run-lint:
    description: Whether to run pylint
    default: "true"

runs:
  using: composite
  steps:
  - name: Install uv
    uses: astral-sh/setup-uv@v8.1.0
    with:
      enable-cache: true
  - name: Sync deps
    shell: bash
    run: |
      if [ -n "${{ inputs.python-version }}" ]; then
        uv sync --all-groups --frozen --python "${{ inputs.python-version }}"
      else
        uv sync --all-groups --frozen
      fi
  - name: Analysing the code with pylint
    if: inputs.run-lint == 'true'
    shell: bash
    run: uv run pylint $(git ls-files '*.py')
  - name: Run pytest
    shell: bash
    run: |
      if [ -n "${{ inputs.python-version }}" ]; then
        uv run --python "${{ inputs.python-version }}" pytest
      else
        uv run pytest
      fi
