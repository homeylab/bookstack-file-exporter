---
name: Test Python Package
description: Test and lint code

runs:
  using: composite
  steps:
  - name: Install uv
    uses: astral-sh/setup-uv@v6
    with:
      enable-cache: true
  - name: Sync deps
    shell: bash
    run: uv sync --all-groups --frozen
  - name: Analysing the code with pylint
    shell: bash
    run: uv run pylint $(git ls-files '*.py')
  - name: Run pytest
    shell: bash
    run: uv run pytest
