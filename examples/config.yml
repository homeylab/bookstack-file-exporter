---
# Logging: text by default. For JSON Lines output (aggregators), run with
# --log-format json or set LOG_FORMAT=json. See README "Log Format".
# if http/https not specified, defaults to https
# if you put http here, it will try verify=false, not to check certs
host: "https://bookstack.mydomain.org"
# optional - set here, or via env BOOKSTACK_TOKEN_ID / BOOKSTACK_TOKEN_SECRET (env wins)
# leave empty or omit this section if using env vars
credentials:
  token_id: ""
  token_secret: ""
# supported formats from bookstack below
# specify one or more
formats:
  - markdown
  - html
  - pdf
  - plaintext
  - zip
# optional - export granularity
# "pages" (default): one file per page; supports assets.export_images/attachments/modify_links
# "books": one combined file per book, in a per-book folder; set export_images/export_attachments
#          to download assets; set modify_links to also rewrite links in markdown/html to local paths
# "chapters": one combined file per chapter, in a per-chapter folder; same export_images/
#             export_attachments/modify_links support as books; loose pages not under a chapter are skipped
# export_level: pages
## optional - include/exclude resources by display-name regex (uses re.fullmatch)
# omit/comment out to disable all filtering. See the "Filters" section in the README.
# filters:
#   shelves:
#     exclude: ["Archive"]            # drop the Archive shelf + everything under it
#   books:
#     include: ["eng-.*"]             # optional allow-list (fullmatch; substring needs .*)
#     exclude: ["draft"]
#   chapters:
#     exclude: []
#   pages:
#     exclude: ["secret", "scratch"]
#   # structural toggle: drop every book that is not on a shelf
#   exclude_unassigned_books: false
# optional how to handle additional content for pages
assets:
  # optional export of all the images used in a page(s).
  # omit this or set to false if not needed
  export_images: false
  # optional export of all the attachments used in a page(s).
  # omit this or set to false if not needed
  export_attachments: false
  # optional rewrite image and attachment URLs in markdown and html exports
  # to local relative paths
  modify_links: false  # legacy 'modify_markdown' key still accepted (deprecated); will be removed in a future version
  ## optional export of metadata about the page in a json file
  # this metadata contains general information about the page
  # like: last update, owner, revision count, etc.
  # omit this or set to false if not needed
  export_meta: false
# optional - override default http_config; omit/comment out to use defaults
# https://urllib3.readthedocs.io/en/stable/reference/urllib3.util.html
http_config:
  # whether or not to verify ssl certificates if using https
  verify_ssl: false
  # set http timeout in seconds for requests
  timeout: 30
  # default backoff_factor 2.5 means we wait 5, 10, 20, and then 40 seconds before our last retry
  # - this should allow for per minute rate limits to be refreshed
  backoff_factor: 2.5
  # which status codes trigger retries
  retry_codes: [413, 429, 500, 502, 503, 504]
  # number of retries
  retry_count: 5
  # any additional headers to add to http requests
  additional_headers:
    test: "test"
    test2: "test2"
    User-Agent: "test-agent"
## optional - upload the archive to one or more S3-compatible buckets (replaces v2 `minio:`)
# omit for local-only backups; see docs/remote-storage.md for full options + migration
# tip: pair with keep_last: -1 below to delete local copies after a successful upload
# object_storage:
#   - name: "minio-main"          # required, unique per entry
#     endpoint: "minio.yourdomain.com"  # host[:port], no scheme; omit entirely for AWS S3
#     bucket: "bookstack-bkps"
#     region: "us-east-1"          # optional; defaults to us-east-1 when endpoint is set
#     prefix: "bookstack/file_backups/"
#     secure: true                 # false for plain-HTTP local minio
#     keep_last: 5                 # retain N archives (0/omit = no action)
#     # creds: per-target env var NAMES (preferred), or inline access_key/secret_key
#     access_key_env: "MINIO_ACCESS_KEY"
#     secret_key_env: "MINIO_SECRET_KEY"
#   - name: "aws-s3"               # region required, endpoint omitted => AWS S3
#     bucket: "bookstack-bkps-s3"
#     region: "us-east-1"
#     # per-target env var NAMES for creds; or set ambient_auth: true to use an
#     # instance/task role or IRSA/Pod Identity instead of static creds
#     access_key_env: "S3_ACCESS_KEY"
#     secret_key_env: "S3_SECRET_KEY"
# directory to export to
# relative or full path
output_path: "bkps/"
## optional - prune older local archives
# -1: delete all after each run (useful when only uploading to object storage)
# 1+: retain that many; 0/omit: no action
keep_last: 5
## optional - if specified exporter will run in a loop
# it will run and then pause for {run_interval} seconds before running again
# specify in seconds, example: 86400 seconds = 24 hours or run once a day
# omit/comment out or set to 0 if you just want a single run and exit
# mutually exclusive with run_schedule below
run_interval: 0
## optional - cron schedule as an alternative to run_interval (mutually exclusive)
# standard 5-field cron; fires at wall-clock times in container-local time (honors TZ env var)
# default timezone is UTC; invalid expressions are rejected at config load
# if a cycle overruns its scheduled tick, the missed tick is skipped (no catch-up)
# example: "0 2 * * *" = 2am daily
# run_schedule: "0 2 * * *"
## optional - opt-in health endpoint for scheduled mode (run_interval or run_schedule)
# when health_port is set, the daemon serves GET /healthz returning JSON:
#   {"status","last_run":{...},"next_run","run_count","failure_count"}
# liveness: returns 200 while the daemon is alive (a single failed cycle does NOT
#   flip it off 200); the scrape signal is last_run.status (never/running/success/failed)
# no server is started unless health_port is set; ignored in one-shot mode
# health_port: 8080
# optional bind address; defaults to 0.0.0.0 (container/k8s friendly).
# set to 127.0.0.1 or a specific NIC on a bare-metal multi-homed host
# health_host: "0.0.0.0"
## optional - if specified exporter will send notifications on failure
# supported notification services are:
# - apprise (https://github.com/caronc/apprise)
# omit/comment out section if not required
notifications:
  # optional - apprise notification config
  # if used, required: specify one or more service_urls or a config_path
  # - if both are specified, config_path takes precedence
  # if service_urls is used, service_urls can also be specified as env var: APPRISE_URLS
  # - env var takes precedence over service_urls below if both specified
  apprise:
    service_urls: []
      # - "json://localhost:8080/notify"
    config_path: ""
    plugin_paths: []
    storage_path: ""
    custom_title: ""
    custom_attachment_path: ""
    on_success: false
    on_failure: true