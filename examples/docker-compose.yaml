name: bookstack-file-exporter
services:
  bookstack-file-exporter:
    image: homeylab/bookstack-file-exporter:latest
    # use a uid/gid that has permissions to write to local dump directory
    user: 1000:1000
    container_name: bookstack-file-exporter
    environment:
      - LOG_LEVEL=info
    # example volumes shown
    # change the left side of the ':' to your preferred files/dir
    volumes:
      - /opt/bookstack/bkps/config.yml:/export/config/config.yml:ro
      - /opt/bookstack/bkps/archives:/export/dump
    # can also pass env variables as a file
    env_file:
      - bkp.env
    # opt-in health endpoint for scheduled mode (run_interval or run_schedule)
    # uncomment together with health_port in config.yml to expose GET /healthz
    # ports:
    #   - "8080:8080"
    # healthcheck:
    #   test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz').status==200 else 1)"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 10s
    restart: always